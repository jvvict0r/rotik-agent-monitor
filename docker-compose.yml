services:
  db:
    image: postgres:17-alpine
    container_name: rotik-monitor-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-rotik_monitor}
      POSTGRES_USER: ${DB_USERNAME:-rotik}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rotik}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-rotik} -d ${DB_DATABASE:-rotik_monitor}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
