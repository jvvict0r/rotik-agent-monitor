name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint e testes)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: rotik
          POSTGRES_PASSWORD: rotik
          POSTGRES_DB: rotik_monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rotik -d rotik_monitor"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Configura o PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, pcntl, mbstring, bcmath, intl
          coverage: none

      - name: Instala dependências
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepara o ambiente
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Cria a base de testes
        run: PGPASSWORD=rotik psql -h 127.0.0.1 -U rotik -d rotik_monitor -c 'CREATE DATABASE rotik_monitor_test;'

      - name: Lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Testes (PHPUnit)
        run: php artisan test

  frontend:
    name: Frontend (lint e build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configura o Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instala dependências
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Build
        run: npm run build
